<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mouse Movement Playback - Computer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        .control-panel {
            background: white;
            padding: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>

<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-4 text-slate-700">Memory Reconstruction Playback - Computer</h1>

        <div class="control-panel grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
            <div>
                <label for="replaySelect" class="block text-sm font-medium text-gray-700">Replay</label>
                <select id="replaySelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 rounded-md">
                    <option value="" selected>-- Select replay --</option>
                    <option value="../../experiments/experiment2/replay_exp2.html">Experiment 2 - Show Gems</option>
                    <option value="replay_exp3.html">Experiment 3 - Computer</option>
                    <option value="../../experiments/experiment4/replay_exp4.html">Experiment 4 - 2 Gems</option>
                </select>
            </div>
            <div>
                <label for="dataFileSelect" class="block text-sm font-medium text-gray-700">Select Data File</label>
                <select id="dataFileSelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                    <option value="" disabled selected>-- Load a file --</option>
                    <option value="../../data/experiment3/mouse_tracking_part_1.json">mouse_tracking_1.json</option>
                    <option value="../../data/experiment3/mouse_tracking_part_2.json">mouse_tracking_2.json</option>
                </select>
            </div>
            <div>
                <label for="subjectSelect" class="block text-sm font-medium text-gray-700">Subject ID</label>
                <select id="subjectSelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 rounded-md"></select>
            </div>
            <div>
                <label for="phaseSelect" class="block text-sm font-medium text-gray-700">Phase</label>
                <select id="phaseSelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 rounded-md"></select>
            </div>
            <div>
                <label for="trialSelect" class="block text-sm font-medium text-gray-700">Trial Number</label>
                <select id="trialSelect"
                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 rounded-md"></select>
            </div>
            <button id="playButton"
                class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-blue-700 transition-colors disabled:bg-gray-400"
                disabled>Play Trial</button>
            <div class="md:col-span-5 flex items-center mt-2">
                <input type="checkbox" id="autoplayCheckbox"
                    class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <label for="autoplayCheckbox" class="ml-2 block text-sm text-gray-900">Autoplay next trial</label>
            </div>
        </div>



        <div id="p5-canvas-holder" class="mt-8 bg-white shadow-lg rounded-lg" style="width:100%; height:80vh;"></div>
    </div>

    <script>

        const replaySelect = document.getElementById('replaySelect');
        replaySelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (!val) return;
            window.location.href = val;
        });


        let experimentData = null;
        let sketchInstance = null;
        let cumulativeScores = {};
        const subjectSelect = document.getElementById('subjectSelect');
        const phaseSelect = document.getElementById('phaseSelect');
        const trialSelect = document.getElementById('trialSelect');
        const playButton = document.getElementById('playButton');

        subjectSelect.addEventListener('change', populatePhases);
        phaseSelect.addEventListener('change', populateTrials);
        playButton.addEventListener('click', playSelectedTrial);

        const autoplayCheckbox = document.getElementById('autoplayCheckbox'); 
        const autoplayDelayMs = 400; 

        function playNextMainTrial() {
            if (!autoplayCheckbox || !autoplayCheckbox.checked) return;

            const currentIndex = trialSelect.selectedIndex;
            const nextIndex = currentIndex + 1;

            if (nextIndex < trialSelect.options.length) {

                trialSelect.selectedIndex = nextIndex;

                setTimeout(() => {
                    playSelectedTrial();
                }, autoplayDelayMs);
            } 
        }


        const dataFileSelect = document.getElementById('dataFileSelect');


        dataFileSelect.addEventListener('change', loadSelectedData);
        subjectSelect.addEventListener('change', populatePhases);
        phaseSelect.addEventListener('change', populateTrials);
        playButton.addEventListener('click', playSelectedTrial);

        async function loadSelectedData() {
            const filePath = dataFileSelect.value;
            if (!filePath) return;

            // Disable UI while loading
            playButton.disabled = true;
            playButton.textContent = 'Loading...';
            subjectSelect.disabled = true;
            phaseSelect.disabled = true;
            trialSelect.disabled = true;

            try {
                const response = await fetch(filePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                experimentData = await response.json();

                // Success! Populate the UI
                populateSubjects();
                playButton.disabled = false;
                playButton.textContent = 'Play Trial';
                subjectSelect.disabled = false;
                phaseSelect.disabled = false;
                trialSelect.disabled = false;

            } catch (error) {
                alert(`Error loading data file: ${filePath}\n\nCheck the path and make sure the file is on the server.\nError: ${error.message}`);
                console.error(error);
                playButton.textContent = 'Load Error';
            }
        }

        function populateSubjects() {
            subjectSelect.innerHTML = '';
            Object.keys(experimentData).forEach(id => subjectSelect.add(new Option(id, id)));
            populatePhases();
        }

        function populatePhases() {
            phaseSelect.innerHTML = '';
            const subj = subjectSelect.value;
            Object.keys(experimentData[subj]).forEach(phase => phaseSelect.add(new Option(phase, phase)));
            populateTrials();
        }

        function populateTrials() {
            trialSelect.innerHTML = '';
            const subj = subjectSelect.value;
            const phase = phaseSelect.value;
            Object.keys(experimentData[subj][phase]).forEach(num => {
                if (!num.endsWith('_confidence')) trialSelect.add(new Option(num, num));
            });
        }

        function p5_playback_sketch_slider(trial, onFinish) {
            return function (p) {
                let startTime, elapsedTime = 0;
                const colors = {
                    background: p.color(241, 245, 249), line: p.color(0),
                    text: p.color(51, 65, 85), cursor: p.color(239, 68, 68, 200),
                };
                let top_y, bottom_y, scale_x;

                let choiceRT_local = null;
                let clickTime_local = null;
                let choiceMoment = null;
                let recordedRevealRt_local = null;
                let revealShowLocal = null;

                const FLASH_MS = 200; 

                p.setup = function () {
                    const canvasHolder = document.getElementById('p5-canvas-holder');
                    p.createCanvas(canvasHolder.clientWidth, canvasHolder.clientHeight).parent('p5-canvas-holder');
                    p.textFont('Inter');
                    p.frameRate(60);
                    top_y = p.height / 4;
                    bottom_y = p.height * 3 / 4;
                    scale_x = p.width / 2;
                    startTime = p.millis();

                    if (trial.choice_rt !== undefined && trial.choice_rt !== null && trial.choice_rt !== "" && trial.choice_rt !== "NA") {
                        const n = Number(trial.choice_rt);
                        if (!isNaN(n)) choiceRT_local = n;
                    }

                    const timesArr = trial.t ? ensureArray(trial.t) : [];
                    if (timesArr.length > 0) {
                        clickTime_local = timesArr[timesArr.length - 1];
                    }

                    choiceMoment = (choiceRT_local !== null) ? choiceRT_local : clickTime_local;

                    if (trial.reveal_rt !== undefined && trial.reveal_rt !== null && trial.reveal_rt !== "" && trial.reveal_rt !== "NA") {
                        const rv = Number(trial.reveal_rt);
                        if (!isNaN(rv)) recordedRevealRt_local = rv;
                    }

                    const flickerTotalDuration = 1000;
                    let revealButtonDelay_local = (trial.reveal_button_delay !== undefined && trial.reveal_button_delay !== null) ? Number(trial.reveal_button_delay) : 1000;

                    if (choiceMoment !== null && choiceMoment !== undefined) {
                        const revealButtonAppearLocal = choiceMoment + flickerTotalDuration + revealButtonDelay_local;
                        revealShowLocal = revealButtonAppearLocal + (recordedRevealRt_local !== null ? recordedRevealRt_local : 0);
                    } else {
                        const revealButtonAppearLocal = flickerTotalDuration + revealButtonDelay_local;
                        revealShowLocal = revealButtonAppearLocal + (recordedRevealRt_local !== null ? recordedRevealRt_local : 0);
                    }
                };

                p.draw = function () {
                    elapsedTime = p.millis() - startTime;
                    p.background(colors.background);
                    drawSliderUI();

                    let currentIndex = -1;
                    if (trial.t && trial.t.length > 0) {
                        for (let i = 0; i < trial.t.length; i++) {
                            if (trial.t[i] <= elapsedTime) currentIndex = i;
                            else break;
                        }
                        if (currentIndex !== -1) {
                            const pos = universal_coordinates_to_screen_coordinates(trial.mouse_universal_x[currentIndex], trial.mouse_universal_y[currentIndex]);

                            const dial_size = 20;

                            p.push();
                            p.stroke(0);
                            p.strokeWeight(0.5);
                            p.fill(255);
                            const dial_y = p.max(p.min(pos.y, bottom_y), top_y);
                            p.ellipse(scale_x, dial_y, dial_size, dial_size);
                            p.pop();

                            let cursorSize = 20;

                            p.push();
                            p.noStroke();
                            p.fill(colors.cursor);
                            p.ellipse(pos.x, pos.y, cursorSize, cursorSize);
                            p.pop();
                        }

                        if (elapsedTime > trial.t[trial.t.length - 1] + 2000) {
                            p.noLoop();
                            if (onFinish) onFinish(); 
                        }
                    } else {
                        const fallbackEnd = (choiceMoment !== null ? choiceMoment : 0) + 3000;
                        if (elapsedTime > fallbackEnd) {
                            p.noLoop();
                            if (onFinish) onFinish();
                        }
                    }
                };

                function drawSliderUI() {
                    p.push(); p.textAlign(p.CENTER, p.BOTTOM); p.textSize(24);
                    p.noStroke(); p.fill(colors.text);
                    p.pop();
                    p.push(); p.stroke(colors.line); p.strokeWeight(4);
                    p.line(scale_x, top_y, scale_x, bottom_y);
                    p.pop();
                    p.push(); p.textAlign(p.LEFT, p.CENTER); p.textSize(20);
                    p.noStroke(); p.fill(colors.text);
                    p.text('Fully confident', scale_x + 30, top_y);
                    p.text('Fully guessing', scale_x + 30, bottom_y);
                    p.pop();
                }

                function universal_coordinates_to_screen_coordinates(uni_x, uni_y) {
                    const slider_height = bottom_y - top_y;
                    const screenY = uni_y * slider_height + top_y;
                    const screenX = uni_x * slider_height + (scale_x - slider_height / 2);
                    return { x: screenX, y: screenY };
                }

                function ensureArray(data) {
                    if (typeof data === 'string') {
                        if (data.indexOf(';') !== -1) return data.split(';').map(Number);
                        try {
                            const parsed = JSON.parse(data);
                            if (Array.isArray(parsed)) return parsed.map(Number);
                        } catch (e) { }
                        return [Number(data)];
                    }
                    return data;
                }
            };
        }



        function playSelectedTrial() {
            if (sketchInstance) sketchInstance.remove();

            const selectedSubj = subjectSelect.value;
            const selectedPhase = phaseSelect.value;
            const selectedTrial = trialSelect.value; 


            const trialData = experimentData[selectedSubj][selectedPhase][selectedTrial];

            if (!trialData) {
                alert(`Error: Could not find data for trial ${selectedTrial}.`);
                return;
            }

            const onSequenceFinish = () => {
                playNextMainTrial();
            };


            const onBoxFinish = () => {
                const confidenceTrialKey = selectedTrial + "_confidence";
                const confidenceTrialData = experimentData[selectedSubj][selectedPhase][confidenceTrialKey];

                if (selectedPhase === 'part2' && confidenceTrialData) {
                    if (sketchInstance) sketchInstance.remove();
                    sketchInstance = new p5(p5_playback_sketch_slider(confidenceTrialData, onSequenceFinish));
                } else {
                    onSequenceFinish();
                }
            };


            if (trialData.trial_type === 'testmouse') {
                sketchInstance = new p5(p5_playback_sketch_boxes(trialData, selectedPhase, onBoxFinish));

            } else {
                alert(`Selected trial is not a main 'testmouse' trial: ${selectedTrial}`);
            }
        }

        let continueButton = { x: 0, y: 0, w: 150, h: 50, label: "Continue", visible: false };

        function p5_playback_sketch_boxes(trial, phase, onFinish) {
            return function (p) {
                let startTime, boxes = [], elapsedTime = 0, images = {};
                let colors = {};
                let state = 'waiting';

                const flickerTotalDuration = 1000;
                const flickerMinInterval = 100;
                const flickerMaxInterval = 700;
                let flickerIndices = [];

                let reveal_both_feedback = false; 
                let reveal_other = false;         
                let show_continue = false;        
                let feedbackStageScheduled = false;
                let stage2TimeoutId = null;       
                let score_for_this_trial = 0;

                const box_width = 180, box_height = 120, total_width = 540 + 64, gap = (total_width - 3 * box_width) / 2;

                let clickTime = null;
                let choiceRT = null;

                let participantChosenIndex = null;
                let computerChosenIndex = null;
                let computerChosenPosition = null; 

                let revealButtonDelay = 1000; 
                let revealButtonAppearRel = null;
                let revealShowRel = null; 
                let reveal_button_dims = null; 
                let continue_button_dims = null; 


                p.preload = function () {
                    images.emerald = p.loadImage('assets/emerald.png', () => { }, () => images.emerald = null);
                    images.stone = p.loadImage('assets/stone.png', () => { }, () => images.stone = null);
                };

                p.setup = function () {
                    if (stage2TimeoutId) { window.clearTimeout(stage2TimeoutId); stage2TimeoutId = null; }
                    reveal_both_feedback = false;
                    reveal_other = false;
                    show_continue = false;
                    feedbackStageScheduled = false;
                    const canvasHolder = document.getElementById('p5-canvas-holder');
                    p.createCanvas(canvasHolder.clientWidth, canvasHolder.clientHeight).parent('p5-canvas-holder');

                    colors = {
                        background: p.color(241, 245, 249),
                        box_default: p.color(255),
                        box_border: p.color(203, 213, 225),
                        text: p.color(51, 65, 85),
                        cursor: p.color(239, 68, 68, 200),
                        outline_blue: p.color(37, 99, 235),
                        progress_bar_bg: p.color(226, 232, 240),
                        progress_bar_fill: p.color(37, 99, 235),
                        feedback_bg_emerald: p.color(220, 252, 231),
                        feedback_bg_stone: p.color(229, 231, 235),
                        feedback_ruby: p.color(239, 68, 68),        
                        feedback_emerald: p.color(34, 197, 94),     
                        feedback_incorrect: p.color(120, 120, 120)  
                    };


                    const start_x = (p.width - total_width) / 2;
                    const y = p.height / 3;
                    const words = [trial.left_word, trial.middle_word, trial.right_word];
                    const numbers = [trial.left_number, trial.middle_number, trial.right_number];
                    const positions = ['left', 'middle', 'right'];


                    continue_button_dims = { x: p.width / 2 - 75, y: y + box_height + 250, w: 150, h: 50 };
                    startTime = p.millis();


                    reveal_button_dims = { x: p.width / 2 - 100, y: y + box_height + 150, w: 200, h: 50 };

                    for (let i = 0; i < 3; i++) {
                        boxes.push({ x: start_x + i * (box_width + gap), y, w: box_width, h: box_height, word: words[i], number: numbers[i], position: positions[i] });
                    }

                    participantChosenIndex = boxes.findIndex(b => b.position === trial.response_position);
                    if (participantChosenIndex === -1) participantChosenIndex = null;
                   

                    flickerIndices = [];
                    for (let i = 0; i < boxes.length; i++) {
                        if (boxes[i].position !== trial.response_position) flickerIndices.push(i);
                    }

                  
                    if (trial.choice_rt !== undefined && trial.choice_rt !== null && trial.choice_rt !== "NA" && trial.choice_rt !== "") {
                        choiceRT = Number(trial.choice_rt);
                        if (isNaN(choiceRT)) choiceRT = null;
                    }

                    const timesArr = trial.t ? ensureArray(trial.t) : [];
                    let lastMouseTime = (timesArr.length > 0) ? timesArr[timesArr.length - 1] : null;

                    clickTime = (choiceRT !== null) ? choiceRT : lastMouseTime;

                    startTime = p.millis();

                    const baseRT = (choiceRT !== null) ? choiceRT : clickTime; 

                    revealButtonDelay = (trial.reveal_button_delay !== undefined && trial.reveal_button_delay !== null) ?
                        Number(trial.reveal_button_delay) : 1000;

                    let recordedRevealRt = null;
                    if (trial.reveal_rt !== undefined && trial.reveal_rt !== null && trial.reveal_rt !== "" && trial.reveal_rt !== "NA") {
                        recordedRevealRt = Number(trial.reveal_rt);
                        if (isNaN(recordedRevealRt)) recordedRevealRt = null;
                    }

                    if (baseRT !== null && baseRT !== undefined) {
                        revealButtonAppearRel = baseRT + flickerTotalDuration + revealButtonDelay;
                        revealShowRel = revealButtonAppearRel + (recordedRevealRt !== null ? recordedRevealRt : 0);
                    } else {
                        revealButtonAppearRel = flickerTotalDuration + revealButtonDelay;
                        revealShowRel = revealButtonAppearRel + (recordedRevealRt !== null ? recordedRevealRt : 0);
                    }

                    reveal_button_dims = { x: p.width / 2 - 100, y: p.height / 3 + box_height + 150, w: 200, h: 50 };
                    continue_button_dims = { x: p.width / 2 - 75, y: p.height / 3 + box_height + 220, w: 150, h: 50 };

                


score_for_this_trial = Number(trial.current_score) || 0;



                };

                p.draw = function () {
                    elapsedTime = p.millis() - startTime;
                    p.background(colors.background);

                    updateStateLogic();
                    drawBoxes();

                    drawProgressBar();
                    drawScoreBoard();

                    if (phase !== 'part2') {
                        if (state === 'reveal_button') {
                            drawRevealButton();
                            drawComputerAnnouncementText();
                        }
                        if (state === 'feedback_reveal') {
                            drawContinueButton();
                        }
                    }

                    if (phase === 'part1' && (state === 'feedback_reveal' || state === 'finished')) {
                        drawFeedbackText();
                    }

                    drawCursor(); 
                };

                function updateStateLogic() {
                    let oldState = state;

                    if (phase === 'part2') {
                        const rtForState = (choiceRT !== null) ? choiceRT : clickTime;
                        if (rtForState === null || elapsedTime < rtForState) {
                            state = 'waiting';
                        } else {
                            state = 'ended';
                            p.noLoop();
                            if (onFinish) onFinish();
                        }

                        
                        return; 
                    }

                    if (typeof revealShowRel !== 'undefined' && revealShowRel !== null) {
                        const choiceMoment = (choiceRT !== null) ? choiceRT : clickTime;

                        if (choiceMoment === null || elapsedTime < choiceMoment) {
                            state = 'waiting';
                        } else if (elapsedTime < choiceMoment + flickerTotalDuration) {
                            state = 'flickering';
                        } else if (elapsedTime < revealButtonAppearRel) {
                            state = 'computer_announcement';
                        } else if (elapsedTime < revealShowRel) {
                            state = 'reveal_button';
                        } else {
                            state = 'feedback_reveal';
                        }
                    } else {
                        const rtForState = (choiceRT !== null) ? choiceRT : clickTime;
                        if (rtForState !== null && rtForState !== undefined) {
                            if (elapsedTime < rtForState) {
                                state = 'waiting';
                            } else if (elapsedTime < rtForState + flickerTotalDuration) {
                                state = 'flickering';
                            } else {
                                state = 'reveal_button';


                            }
                        }
                    }

                    if (oldState !== state && (state === 'computer_announcement' || state === 'reveal_button' || state === 'feedback_reveal')) {
                        const remaining = [];
                        for (let i = 0; i < boxes.length; i++) {
                            if (i !== participantChosenIndex) remaining.push(i);
                        }
                        if (remaining.length === 0) {
                            computerChosenIndex = 0;
                        } else if (remaining.length === 1) {
                            computerChosenIndex = remaining[0];
                        } else {
                            const side = (Number(trial.computer_choice_side) === 1) ? 1 : 0;
                            computerChosenIndex = (side === 0) ? Math.min(remaining[0], remaining[1]) : Math.max(remaining[0], remaining[1]);
                        }
                        computerChosenPosition = boxes[computerChosenIndex] ? boxes[computerChosenIndex].position : null;
                        
                    }

                    

                    if (oldState !== state && state === 'feedback_reveal' && !feedbackStageScheduled) {
                        feedbackStageScheduled = true;

                        reveal_both_feedback = true;
                        reveal_other = false;
                        show_continue = false;

                        if (stage2TimeoutId) window.clearTimeout(stage2TimeoutId);

                        stage2TimeoutId = window.setTimeout(() => {
                            reveal_other = true;
                            window.setTimeout(() => {
                                show_continue = true;
                            }, 500);

                        }, 500);

                        try {
    const participantIndex = participantChosenIndex;
    const computerIndex = computerChosenIndex;

    let perTrialPoints = 0;

    if (typeof participantIndex !== 'undefined' && participantIndex !== null && boxes[participantIndex]) {
        const participantBox = boxes[participantIndex];
        const participantCorrect = (participantBox.position === trial.correct_choice_position);
        if (participantCorrect) {
            perTrialPoints += Number(participantBox.number || 0);
        }
    }

    if (typeof computerIndex !== 'undefined' && computerIndex !== null && boxes[computerIndex]) {
        const computerBox = boxes[computerIndex];
        const computerCorrect = (computerBox.position === trial.correct_choice_position);
        if (computerCorrect) {
            if (computerIndex !== participantIndex) {
                perTrialPoints += Number(computerBox.number || 0);
            }
        }
    }

    score_for_this_trial += perTrialPoints

    try { trial.cumulative_score = updated; } catch (e) { /* ignore if read-only */ }

} catch (e) {
    console.warn('Failed to compute score_for_this_trial in playback:', e);
}

                    }

                }


                function drawButtonObj(btn) {
                    if (!btn || !btn.visible) return;
                    p.push();
                    p.noStroke();
                    p.fill(colors.progress_bar_fill);
                    p.rect(btn.x, btn.y, btn.w, btn.h, 6);

                    p.fill(255);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.textSize(16);
                    p.text(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2);
                    p.pop();
                }

                
                let showDebugScoreBox = false;

                function drawScoreBoard() {
                    const currentPhase = (typeof phase !== 'undefined' && phase !== null) ? phase : (trial.phase || '');
                    if (currentPhase !== 'part1') return;

                    if (typeof score_for_this_trial === 'undefined' || score_for_this_trial === null) {
                        if (trial.cumulative_score !== undefined && trial.cumulative_score !== null) {
                            score_for_this_trial = Number(trial.cumulative_score) || 0;
                        } else if (trial.current_score !== undefined && trial.current_score !== null && typeof trial.current_score !== 'function') {
                            score_for_this_trial = Number(trial.current_score) || 0;
                        } else {
                            score_for_this_trial = 0;
                        }
                    }

                    const box_width = 150;
                    const box_height = 50;

                    const x = p.width - box_width - 20;
                    const y = 20;

                    p.push();

                    p.fill(255);
                    if (colors && colors.progress_bar_bg) {
                        p.stroke(220);
                    } else {
                        p.stroke(220);
                    }
                    p.strokeWeight(1.5);
                    p.rect(x, y, box_width, box_height, 8);

                    p.noStroke();
                    p.fill(colors && colors.text ? colors.text : p.color(51, 65, 85));
                    p.textSize(18);
                    p.textStyle(p.BOLD);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text(`Points: ${score_for_this_trial}`, x + box_width / 2, y + box_height / 2);
                    p.pop();

                    if (showDebugScoreBox) {
                        p.push();
                        p.noFill();
                        p.stroke(255, 0, 0);
                        p.strokeWeight(1);
                        p.rect(x - 4, y - 4, box_width + 8, box_height + 8);
                        p.pop();
                    }
                }


                function drawComputerAnnouncementText() {
                    if (computerChosenIndex === null || typeof computerChosenIndex === 'undefined') return;
                    const box = boxes[computerChosenIndex];

                    p.push();
                    p.noStroke();
                    p.fill(0); 
                    p.textSize(28);
                    p.textAlign(p.CENTER, p.TOP);
                    p.text(`The computer chose "${box.word} (${box.number})"`, p.width / 2, p.height / 3 - 40);
                    p.pop();
                }

                function drawFeedbackText() {
                    if (phase !== 'part1') return;
                    if (state !== 'feedback_reveal' && state !== 'finished') return;

                    const pIdx = (participantChosenIndex !== null && participantChosenIndex !== undefined) ? participantChosenIndex :
                        boxes.findIndex(b => b.position === trial.response_position);
                    const cIdx = (computerChosenIndex !== null && computerChosenIndex !== undefined) ? computerChosenIndex :
                        boxes.findIndex(b => b.position === trial.computer_response_position);

                    if (pIdx === -1 || typeof pIdx === 'undefined' || !boxes[pIdx]) return;

                    const box = boxes[pIdx];
                    const participant_correct = (box.position === trial.correct_choice_position);
                    const computer_correct = (typeof cIdx !== 'undefined' && cIdx !== -1 && boxes[cIdx] && boxes[cIdx].position === trial.correct_choice_position);

                    const either_is_correct = participant_correct || computer_correct;

                    let gem_number = 0;
                    if (participant_correct) gem_number = Number(box.number || 0);
                    else if (computer_correct && typeof cIdx !== 'undefined' && boxes[cIdx]) gem_number = Number(boxes[cIdx].number || 0);

                    let stone_number = 0;
                    if (!participant_correct) stone_number += Number(box.number || 0);
                    if (!computer_correct && typeof cIdx !== 'undefined' && boxes[cIdx]) stone_number += Number(boxes[cIdx].number || 0);

                    const txt = either_is_correct
                        ? `You got ${gem_number} gems and ${stone_number} stones`
                        : `Oh no, you only got ${stone_number} stones`;

                    const txt_color = either_is_correct ? getBorderColor(true) : p.color(0);

                    p.push();
                    p.noStroke();
                    p.fill(txt_color);
                    p.textSize(28);
                    p.textAlign(p.CENTER, p.TOP);
                    p.text(txt, p.width / 2, p.height / 3 - 40);
                    p.pop();
                }


                function drawContinueButton() {
                    if (!show_continue) return;
                    p.push();
                    p.fill(colors.progress_bar_fill);
                    p.noStroke();
                    p.rect(continue_button_dims.x, continue_button_dims.y, continue_button_dims.w, continue_button_dims.h, 5);
                    p.fill(255);
                    p.textSize(18);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text("Continue", continue_button_dims.x + continue_button_dims.w / 2, continue_button_dims.y + continue_button_dims.h / 2);
                    p.pop();
                }

                function getBorderColor(is_correct) {
                    if (is_correct) {
                        return (trial.correct_choice_position === trial.rubyposition) ? colors.feedback_ruby : colors.feedback_emerald;
                    }
                    return colors.feedback_incorrect;
                }



                function drawBoxes() {
                    for (let index = 0; index < boxes.length; index++) {
                        const box = boxes[index];
                        p.push();

                        const is_correct_box = (box.position === trial.correct_choice_position);
                        const is_participant_box = (index === participantChosenIndex) || (box.position === trial.response_position);
                        const is_computer_box = (index === computerChosenIndex);
                        const is_part1_chosen_box = (box.position === trial.part1_response_position);
                        const gem_position = (box.position === trial.correct_choice_position)

                        let show_content = false;
                        let fill_color = colors.box_default;

                        let border_color = colors.box_border;
                        let outline_thick = false;

                        let inferred_computer_position = null;

                        if (phase === 'part2') {
                            const allPositions = ['left', 'middle', 'right'];
                            inferred_computer_position = allPositions.filter(pos =>
                                pos !== trial.correct_choice_position &&
                                pos !== trial.stoneposition
        
                            )[0] || null;
                        }

                    


                        if (phase === 'part1') {
                            if (trial.is_show_trial) {
                                show_content = true;
                                fill_color = is_correct_box ? colors.feedback_bg_emerald : colors.feedback_bg_stone;
                            }

                            if (state === 'finished') {
                                show_content = true;
                                fill_color = is_correct_box ? colors.feedback_bg_emerald : colors.feedback_bg_stone;
                            }
                        } else if (phase === 'part2') {
                            show_content = false;
                            border_color = colors.box_border;
                        }

                        if (reveal_both_feedback) {
                            if (is_participant_box || is_computer_box) {
                                show_content = true;
                                fill_color = is_correct_box ? colors.feedback_bg_emerald : colors.feedback_bg_stone;
                                outline_thick = true;
                            }
                        }

                        
                        if (reveal_other) {
                            if (!is_participant_box && !is_computer_box) {
                                show_content = true;
                                fill_color = is_correct_box ? colors.feedback_bg_emerald : colors.feedback_bg_stone;
                            }
                        }

                        const choiceMoment = (choiceRT !== null && choiceRT !== undefined) ? choiceRT : clickTime;
                        if (choiceMoment !== null && choiceMoment !== undefined && elapsedTime >= choiceMoment) {
                            if (is_participant_box) outline_thick = true;
                        }

                        if (phase !== 'part2' && state === 'flickering' && flickerIndices && flickerIndices.length > 0) {
                            const base = (choiceRT !== null && choiceRT !== undefined) ? choiceRT : (clickTime || 0);
                            const timeInFlicker = Math.max(0, elapsedTime - base);
                            const flickerStepMs = 200;
                            const flickerCurrent = Math.floor(timeInFlicker / flickerStepMs) % 2;
                            const adjustedIndex = (flickerCurrent + (Number(trial.computer_start_side) || 0)) % flickerIndices.length;
                            const flickerTarget = flickerIndices[adjustedIndex];
                            if (index === flickerTarget) outline_thick = true;
                        }

                        if (phase !== 'part2' && computerChosenIndex !== null && computerChosenIndex !== undefined) {
                            if (index === computerChosenIndex) outline_thick = true;
                        }

                        if (phase === 'part1' && index === computerChosenIndex && computerChosenIndex !== null && typeof computerChosenIndex !== 'undefined') {
                            p.strokeWeight(5);
                            p.stroke(colors.outline_blue);
                        } else if (outline_thick) {
                            p.strokeWeight(5);
                            p.stroke(colors.outline_blue);
                        } else {
                            p.strokeWeight(3);
                            p.stroke(border_color);
                        }

                        if (phase === 'part2') {
                            if (gem_position) {
                                p.strokeWeight(5);
                                p.stroke(colors.feedback_emerald);
                            }
                        }


                        p.fill(fill_color);
                        p.rect(box.x, box.y, box.w, box.h);

                        p.noStroke();
                        p.textAlign(p.CENTER, p.CENTER);
                        let textFill = colors.text;
                        if (phase === 'part2' && box.position === trial.part1_response_position) textFill = colors.feedback_ruby;

                        if (phase === 'part2' && box.position === trial.computer_response_position_p1) textFill = colors.outline_blue;

                                

                        p.fill(textFill);
                        p.textSize(24);
                        p.textStyle(p.BOLD);
                        p.text(box.word, box.x + box.w / 2, box.y + box.h / 2 - 14);
                        p.text(`(${box.number})`, box.x + box.w / 2, box.y + box.h / 2 + 14);
                        p.pop();

                        if (show_content) {
                            const is_correct = is_correct_box;
                            let img_to_draw;
                            if (is_correct) {
                                img_to_draw = (box.position === trial.rubyposition && images.ruby) ? images.ruby : images.emerald;
                            } else {
                                img_to_draw = images.stone;
                            }
                            drawBoxContent(box, img_to_draw);
                        }
                    }
                }






                function drawBoxContent(box, img) {
                    if (!img) return;

                    // smaller gems/stones
                    const img_size = 40;           
                    const vertical_spacing = 1;  

                    const img_y_start = box.y + box.h + 8;

                    for (let k = 0; k < Number(box.number || 0); k++) {
                        p.image(
                            img,
                            box.x + box.w / 2 - img_size / 2,
                            img_y_start + k * (img_size * vertical_spacing),
                            img_size,
                            img_size
                        );
                    }
                }



                function drawProgressBar() {
                    
                    const bar_width = 604;
                    const bar_height = 10;
                    const x = (p.width - bar_width) / 2;
                    const y = p.height / 3 - 80;

                    let prog = 0;

                    prog = trialSelect.value / 50;

                    p.push();
                    p.noStroke();

                    p.fill(colors.progress_bar_bg);
                    p.rect(x, y, bar_width, bar_height, 5);

                    p.fill(colors.progress_bar_fill);
                    p.rect(x, y, bar_width * prog, bar_height, 5);
                    p.pop();
                }

                function drawRevealButton() {

                    p.push();
                    p.fill(colors.progress_bar_fill);
                    p.noStroke();
                    p.rect(reveal_button_dims.x, reveal_button_dims.y, reveal_button_dims.w, reveal_button_dims.h, 5);
                    p.fill(255);
                    p.textSize(18);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text("Reveal box contents", reveal_button_dims.x + reveal_button_dims.w / 2, reveal_button_dims.y + reveal_button_dims.h / 2);
                    p.pop();
                }


                function universal_coordinates_to_screen_coordinates(univX, univY) {
                    const leftX = boxes[0].x;
                    const rightX = boxes[2].x + boxes[2].w;
                    const totalSpanX = rightX - leftX;
                    const screenX = leftX + (isNaN(univX) ? 0 : univX) * totalSpanX;

                    const topY = boxes[0].y;
                    const totalSpanY = boxes[0].h;
                    const screenY = topY + (isNaN(univY) ? 0 : univY) * totalSpanY;

                    return { x: screenX, y: screenY };
                }

                function drawCursor() {
                    if (trial.t && trial.mouse_universal_x && trial.mouse_universal_y) {
                        const times = ensureArray(trial.t);
                        const xs = ensureArray(trial.mouse_universal_x);
                        const ys = ensureArray(trial.mouse_universal_y);

                        if (!times.length || !xs.length || !ys.length) return;

                        let currentIndex = -1;
                        for (let i = 0; i < times.length; i++) {
                            if (times[i] <= elapsedTime) currentIndex = i;
                            else break;
                        }

                        if (currentIndex !== -1) {
                            const pos = universal_coordinates_to_screen_coordinates(xs[currentIndex], ys[currentIndex]);

                            let cursorSize = 20;
                            if (clickTime !== null &&
                                elapsedTime >= clickTime &&
                                elapsedTime < clickTime + 200) {
                                cursorSize = 40;
                            }

                            p.push();
                            p.noStroke();
                            p.fill(colors.cursor);
                            p.ellipse(pos.x, pos.y, cursorSize, cursorSize);
                            p.pop();
                        }

                        if (elapsedTime > times[times.length - 1] + 3000) {
                            p.noLoop();
                            if (onFinish) onFinish();
                        }
                    } else {
                        if (trial.click_position_universal && clickTime !== null) {
                            const clickPos = JSON.parse(trial.click_position_universal);
                            const pos = universal_coordinates_to_screen_coordinates(clickPos.x, clickPos.y);

                            if (elapsedTime >= clickTime && elapsedTime < clickTime + 200) {
                                p.push();
                                p.noStroke();
                                p.fill(colors.cursor);
                                p.ellipse(pos.x, pos.y, 40, 40);
                                p.pop();
                            }
                        }
                    }
                }

                function ensureArray(data) {
                    if (typeof data === 'string') {
                        if (data.indexOf(';') !== -1) return data.split(';').map(Number);
                        try {
                            const parsed = JSON.parse(data);
                            if (Array.isArray(parsed)) return parsed.map(Number);
                        } catch (e) { }
                        return [Number(data)];
                    }
                    return data;
                }
            };
        }
    </script>
